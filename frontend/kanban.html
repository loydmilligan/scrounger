<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrounger Sales Funnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }
        
        h1 {
            text-align: center;
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #16213e;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        .status-bar .cache-status {
            color: #00b894;
        }
        
        .status-bar .cache-status.expired {
            color: #fdcb6e;
        }
        
        .status-bar .pending-badge {
            background: #e17055;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .sync-btn {
            background: #00b894;
            color: #1a1a2e;
            border: none;
            padding: 6px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .sync-btn:hover {
            background: #00cec9;
        }
        
        .sync-btn:disabled {
            background: #636e72;
            cursor: not-allowed;
        }
        
        .kanban {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 120px);
            overflow: hidden;
        }
        
        .column {
            min-width: 200px;
            flex: 1;
            max-width: 500px;
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            border: 2px solid #0f3460;
        }
        
        .column-header {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #0f3460;
        }
        
        .column-header.agreement { background: #636e72; }
        .column-header.paid { background: #0984e3; }
        .column-header.printed { background: #6c5ce7; }
        .column-header.packaged { background: #a29bfe; color: #333; }
        .column-header.shipped { background: #00b894; color: #333; }
        .column-header.delivered { background: #fdcb6e; color: #333; }
        .column-header.confirmed { background: #e17055; }
        .column-header.complete { background: #00cec9; color: #333; }
        
        .card {
            background: #0f3460;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 8px solid #00d4ff;
            transition: transform 0.2s;
        }
        
        .card:hover {
            transform: scale(1.02);
        }
        
        .card.green { border-left-color: #00b894; }
        .card.yellow { border-left-color: #fdcb6e; }
        .card.orange { border-left-color: #e17055; }
        .card.red { border-left-color: #d63031; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .card-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-price {
            font-size: 1.2rem;
            color: #fdcb6e;
            font-weight: bold;
        }
        
        .card-value {
            font-size: 0.9rem;
            color: #aaa;
        }
        
        .card-marketplace {
            font-size: 0.9rem;
            color: #74b9ff;
            margin: 5px 0;
        }
        
        .card-deadline {
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 5px;
            padding: 5px;
            border-radius: 4px;
            text-align: center;
        }
        
        .card-deadline.green { background: #00b894; color: #fff; }
        .card-deadline.yellow { background: #fdcb6e; color: #333; }
        .card-deadline.orange { background: #e17055; color: #fff; }
        .card-deadline.red { background: #d63031; color: #fff; }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px;
            font-size: 1.5rem;
        }
        
        .empty {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 1.5rem;
        }
        
        .last-updated {
            text-align: center;
            color: #555;
            font-size: 1.2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Scrounger Sales Funnel</h1>
    <div class="status-bar">
        <span class="cache-status" id="cacheStatus">Loading...</span>
        <div>
            <span class="pending-badge" id="pendingBadge" style="display:none">0 pending</span>
            <button class="sync-btn" id="syncBtn" onclick="syncPending()">Sync Now</button>
        </div>
    </div>
    <div class="kanban" id="kanban"></div>
    <div class="last-updated" id="updated"></div>
    
    <script>
        const STATUS_ORDER = ['AGREEMENT', 'PAID', 'PRINTED', 'PACKAGED', 'SHIPPED', 'DELIVERED', 'CONFIRMED', 'COMPLETE'];
        
        const STATUS_MAP = {
            'AGREED': 'AGREEMENT',
            'INVENTORY': 'AGREEMENT',
            'DRAFT': 'AGREEMENT',
            'LISTED': 'AGREEMENT',
            'INTEREST': 'AGREEMENT',
            'PAID': 'PAID',
            'PRINTED': 'PRINTED',
            'PRINTED SHIPPING LABEL': 'PRINTED',
            'LABEL PRINTED': 'PRINTED',
            'PACKAGED': 'PACKAGED',
            'PACKED': 'PACKAGED',
            'SHIPPED': 'SHIPPED',
            'DELIVERED': 'DELIVERED',
            'CONFIRMED': 'CONFIRMED',
            'COMPLETE': 'COMPLETE',
            'ARCHIVED': 'COMPLETE',
            'DISPUTE': 'COMPLETE'
        };
        
        const DAYS_3_YEARS = 1095;
        const MIN_VALUE_PCT = 0.20;
        
        function parseDate(dateStr) {
            if (!dateStr) return null;
            if (typeof dateStr === 'number') {
                return new Date(1899, 11, 30 + dateStr);
            }
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return new Date(parts[2], parts[0] - 1, parts[1]);
            }
            return new Date(dateStr);
        }
        
        function calculateCurrentValue(retailPrice, datePurchase) {
            if (!retailPrice || !datePurchase) return retailPrice || 0;
            
            const purchaseDate = parseDate(datePurchase);
            if (!purchaseDate) return retailPrice;
            
            const daysOwned = (new Date() - purchaseDate) / (1000 * 60 * 60 * 24);
            
            if (daysOwned <= 0) return retailPrice;
            if (daysOwned >= DAYS_3_YEARS) return Math.round(retailPrice * MIN_VALUE_PCT * 100) / 100;
            
            const logDecay = Math.log(1 + daysOwned) / Math.log(1 + DAYS_3_YEARS);
            const currentPct = MIN_VALUE_PCT + (1 - MIN_VALUE_PCT) * (1 - logDecay);
            
            return Math.round(retailPrice * currentPct * 100) / 100;
        }
        
        function getDeadlineInfo(item) {
            const status = (item.status || '').toUpperCase();
            const now = new Date();
            
            if (status === 'PAID' && item.datePaid) {
                const paidDate = parseDate(item.datePaid);
                const deadline = new Date(paidDate);
                deadline.setDate(deadline.getDate() + 5);
                return { deadline, action: 'Ship', daysLeft: Math.ceil((deadline - now) / (1000 * 60 * 60 * 24)) };
            }
            
            if (status === 'SHIPPED' && item.datePaid) {
                const paidDate = parseDate(item.datePaid);
                const deadline = new Date(paidDate);
                deadline.setDate(deadline.getDate() + 5);
                return { deadline, action: 'Deliver', daysLeft: Math.ceil((deadline - now) / (1000 * 60 * 60 * 24)) };
            }
            
            if (status === 'DELIVERED' && item.dateDelivered) {
                const deliveredDate = parseDate(item.dateDelivered);
                const deadline = new Date(deliveredDate);
                deadline.setDate(deadline.getDate() + 3);
                return { deadline, action: 'Confirm', daysLeft: Math.ceil((deadline - now) / (1000 * 60 * 60 * 24)) };
            }
            
            return null;
        }
        
        function getUrgencyColor(deadlineInfo) {
            if (!deadlineInfo) return 'green';
            const { daysLeft } = deadlineInfo;
            
            if (daysLeft <= 0) return 'red';
            if (daysLeft <= 1) return 'orange';
            if (daysLeft <= 3) return 'yellow';
            return 'green';
        }
        
        let fromCache = false;
        let pendingUpdates = [];
        
        async function fetchData() {
            const response = await fetch('http://localhost:8001/api/sales');
            const data = await response.json();
            if (data.fromCache) {
                fromCache = true;
                return data.data || [];
            }
            fromCache = false;
            return data;
        }
        
        async function checkPending() {
            const response = await fetch('http://localhost:8001/api/pending');
            const data = await response.json();
            pendingUpdates = data.updates || [];
            const badge = document.getElementById('pendingBadge');
            const syncBtn = document.getElementById('syncBtn');
            if (pendingUpdates.length > 0) {
                badge.style.display = 'inline';
                badge.textContent = `${pendingUpdates.length} pending`;
                syncBtn.disabled = !fromCache;
            } else {
                badge.style.display = 'none';
                syncBtn.disabled = false;
            }
        }
        
        async function syncPending() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.textContent = 'Syncing...';
            try {
                const response = await fetch('http://localhost:8001/api/sync');
                const result = await response.json();
                if (result.success) {
                    btn.textContent = 'Synced!';
                    setTimeout(() => { btn.textContent = 'Sync Now'; btn.disabled = false; }, 2000);
                } else {
                    btn.textContent = 'Sync Failed';
                    setTimeout(() => { btn.textContent = 'Sync Now'; btn.disabled = false; }, 2000);
                }
            } catch (e) {
                btn.textContent = 'Sync Error';
                setTimeout(() => { btn.textContent = 'Sync Now'; btn.disabled = false; }, 2000);
            }
            await checkPending();
        }
        
        async function saveUpdate(item) {
            const response = await fetch('http://localhost:8001/api/sales', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(item)
            });
            await checkPending();
        }
        
        async function render() {
            try {
                await checkPending();
                
                const statusEl = document.getElementById('cacheStatus');
                statusEl.textContent = fromCache ? '⚠️ Using cached data' : '✓ Live data';
                statusEl.className = 'cache-status' + (fromCache ? ' expired' : '');
                
                const items = await fetchData();
                
                const buckets = {};
                STATUS_ORDER.forEach(s => buckets[s] = []);
                
                items.forEach(item => {
                    const bucket = STATUS_MAP[(item.status || '').toUpperCase()] || 'AGREEMENT';
                    if (buckets[bucket]) {
                        item.currentValue = calculateCurrentValue(item.retailPrice, item.datePurchase);
                        buckets[bucket].push(item);
                    }
                });
                
                const kanban = document.getElementById('kanban');
                kanban.innerHTML = '';
                
                STATUS_ORDER.forEach(status => {
                    const column = document.createElement('div');
                    column.className = 'column';
                    
                    const header = document.createElement('div');
                    header.className = `column-header ${status.toLowerCase()}`;
                    header.textContent = `${status} (${buckets[status].length})`;
                    column.appendChild(header);
                    
                    if (buckets[status].length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'empty';
                        empty.textContent = '-- empty --';
                        column.appendChild(empty);
                    } else {
                        buckets[status].forEach(item => {
                            const deadlineInfo = getDeadlineInfo(item);
                            const urgency = getUrgencyColor(deadlineInfo);
                            
                            const card = document.createElement('div');
                            card.className = `card ${urgency}`;
                            
                            const title = document.createElement('div');
                            title.className = 'card-title';
                            title.textContent = item.itemName || 'Unknown';
                            card.appendChild(title);
                            
                            const price = document.createElement('div');
                            price.className = 'card-price';
                            price.textContent = `$${item.salePrice || 0}`;
                            card.appendChild(price);
                            
                            const value = document.createElement('div');
                            value.className = 'card-value';
                            value.textContent = `Value: $${item.currentValue || 0}`;
                            card.appendChild(value);
                            
                            if (item.marketplace) {
                                const marketplace = document.createElement('div');
                                marketplace.className = 'card-marketplace';
                                marketplace.textContent = item.marketplace;
                                card.appendChild(marketplace);
                            }
                            
                            if (deadlineInfo) {
                                const deadline = document.createElement('div');
                                deadline.className = `card-deadline ${urgency}`;
                                if (deadlineInfo.daysLeft <= 0) {
                                    deadline.textContent = `${deadlineInfo.action}: OVERDUE!`;
                                } else {
                                    deadline.textContent = `${deadlineInfo.action}: ${deadlineInfo.daysLeft}d`;
                                }
                                card.appendChild(deadline);
                            }
                            
                            column.appendChild(card);
                        });
                    }
                    
                    kanban.appendChild(column);
                });
                
                document.getElementById('updated').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                console.error(e);
                const kanban = document.getElementById('kanban');
                kanban.innerHTML = `<div class="error">Error loading data: ${e.message}</div>`;
            }
        }
        
        render();
        setInterval(render, 1800000); // 30 minutes
    </script>
</body>
</html>
