services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scrounger-backend
    ports:
      - "8849:8000"
    environment:
      - DATABASE_URL=sqlite:///./scrounger.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./backend/data:/app/data
      - ./backend/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scrounger-frontend
    ports:
      - "8851:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: scrounger-network
